name: Release

on:
  push:
    branches:
      - release
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to publish (e.g. v1.0.1)'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  id-token: write # NPM Provenance (OIDC) 인증을 위한 필수 권한

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Vitest
        run: npm run test

      - uses: google-github-actions/release-please-action@v4
        id: release
        with:
          release-type: node
          target-branch: release

      - name: Build project
        if: ${{ steps.release.outputs.release_created }}
        run: npm run build

      - name: Publish to npm (with Provenance)
        if: ${{ steps.release.outputs.release_created }}
        run: npm publish --access public --provenance

      - name: Sync release changes back to main
        if: ${{ steps.release.outputs.release_created }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          git merge origin/release --no-edit
          git push origin main

  publish:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Publish to npm (with Provenance)
        run: npm publish --access public --provenance
