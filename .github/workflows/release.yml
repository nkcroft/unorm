name: Release

on:
  push:
    branches:
      - release
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to publish (e.g. v1.0.1)'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Vitest
        run: npm run test

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: node
          target-branch: release

      - name: Setup Node.js for publish
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies for publish
        if: ${{ steps.release.outputs.release_created }}
        run: npm ci

      - name: Build project
        if: ${{ steps.release.outputs.release_created }}
        run: npm run build

      - name: Publish to npm
        id: publish
        if: ${{ steps.release.outputs.release_created }}
        run: npm publish --access public
        continue-on-error: true

      - name: Cleanup tag/release on publish failure
        if: ${{ steps.release.outputs.release_created && steps.release.outputs.tag_name && steps.publish.outcome == 'failure' }}
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
        run: |
          echo "Publish failed. Cleaning up GitHub Release and tag: ${TAG_NAME}"

          # Delete GitHub Release (if it exists)
          gh release delete "${TAG_NAME}" --yes || true

          # Delete remote tag (if it exists)
          git push origin ":refs/tags/${TAG_NAME}" || true

          echo "Cleanup completed for ${TAG_NAME}."

      - name: Sync release changes back to main
        if: ${{ steps.release.outputs.release_created && steps.publish.outcome != 'failure' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          git merge origin/release --no-edit
          git push origin main

  publish:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Publish to npm
        run: npm publish --access public
